baseURL = 'http://localhost:1313'
languageCode = 'pt-br'
title = 'Danilo Santos'
theme = 'hello-friend-ng'


defaultContentLanguage = 'pt-br'
defaultContentLanguageInSubdir = true
enableGlobalLanguageMenu = true
enableMissingTranslationPlaceholders = true

[params]


[languages]
  [languages.pt-br]
    contentDir = 'content/pt-br'
    disabled = false
    languageCode = 'pt-BR'
    languageName = 'Pt-Br'
    title = 'Site Português'
    weight = 1
    [languages.pt-br.menus]
      [[languages.pt-br.menus.main]]
        name = 'Posts'
        pageRef = '/posts'
        weight = 1
      [[languages.pt-br.menus.main]]
        name = 'Sobre'
        pageRef = '/about'
        weight = 2
    [languages.pt-br.params]
      subtitle = 'Dados'
  [languages.en]
    contentDir = 'content/en'
    disabled = false
    languageCode = 'en-US'
    languageDirection = 'ltr'
    languageName = 'En'
    title = 'Site English'
    weight = 2
    [languages.en.menus]
      [[languages.en.menus.main]]
        name = 'Posts'
        pageRef = '/posts'
        weight = 1
      [[languages.en.menus.main]]
        name = 'About'
        pageRef = '/about'
        weight = 2
    [languages.en.params]
      subtitle = 'Data'
